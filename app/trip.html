<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的行程</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="content" id="tripRoot">
    <!-- Hero 由 JS 渲染 -->
    <div id="heroSlot"></div>

    <div class="trip-toolbar">
      <div class="tpl-switch">
        <button class="tool-btn" id="tplBtn" type="button">🎨 风格</button>
        <div class="tpl-menu" id="tplMenu">
          <button type="button" data-tpl="resort"><span class="sw" style="background:linear-gradient(135deg,#0e7a5f,#14a37f)"></span>清新度假</button>
          <button type="button" data-tpl="ocean"><span class="sw" style="background:linear-gradient(135deg,#0b6ea8,#2b9fd8)"></span>海洋蓝</button>
          <button type="button" data-tpl="sunset"><span class="sw" style="background:linear-gradient(135deg,#c0562a,#e07a3e)"></span>暖阳橙</button>
          <button type="button" data-tpl="minimal"><span class="sw" style="background:linear-gradient(135deg,#334155,#64748b)"></span>极简灰</button>
        </div>
      </div>
      <button class="tool-btn" id="shareBtn" type="button">🔗 复制分享链接</button>
      <button class="tool-btn" id="editBtn" type="button">✏️ 编辑</button>
      <a class="tool-btn" href="index.html">＋ 新行程</a>
    </div>

    <nav class="main-tabs">
      <button class="main-tab active" type="button" data-mtab="trip">🗺️ 行程</button>
      <button class="main-tab" type="button" data-mtab="booking">📋 预定清单</button>
      <button class="main-tab" type="button" data-mtab="packing">🎒 出行物品</button>
      <button class="main-tab" type="button" data-mtab="expense">💰 花销</button>
      <button class="main-tab" type="button" data-mtab="photos">🖼️ 照片墙</button>
    </nav>

    <main class="wrap main-panel active" id="mpanel-trip"></main>
    <section class="wrap main-panel" id="mpanel-booking"></section>
    <section class="wrap main-panel" id="mpanel-packing"></section>
    <section class="wrap main-panel" id="mpanel-expense"></section>
    <section class="wrap main-panel" id="mpanel-photos"></section>

    <footer>🌿 由行程生成平台创建 · 具体价格与航班请以实时预订为准</footer>
  </div>

  <!-- 加载态 -->
  <div class="gen-overlay" id="loadOverlay">
    <div class="spinner"></div>
    <div class="ov-text" id="loadText">加载行程中…</div>
  </div>

  <!-- 花销弹窗 -->
  <div class="modal-mask" id="expModal">
    <div class="modal">
      <h3 id="expTitle">记一笔</h3>
      <div class="m-meta" id="expPerson"></div>
      <label>金额（¥）</label>
      <input type="number" id="expAmount" min="0" step="0.01" placeholder="例如 128.5">
      <label>说明</label>
      <input type="text" id="expNote" placeholder="例如：午餐 / 门票 / 加油">
      <label>时间</label>
      <input type="datetime-local" id="expTime">
      <div class="modal-actions">
        <button class="btn ghost" id="expCancel" type="button" style="background:#eef3f1;color:#3a5850;">取消</button>
        <button class="btn primary" id="expSave" type="button" style="background:var(--primary);color:#fff;">保存</button>
      </div>
    </div>
  </div>

  <!-- 编辑抽屉 -->
  <div class="editor-mask" id="editorMask"></div>
  <aside class="editor" id="editor">
    <div class="editor-head">
      <h3>✏️ 编辑行程</h3>
      <button class="editor-close" id="editorClose" type="button">×</button>
    </div>
    <div class="editor-body" id="editorBody"></div>
    <div class="editor-foot">
      <button class="btn ghost" id="editorCancel" type="button" style="flex:1;border:1px solid var(--line);background:#eef3f1;color:#3a5850;border-radius:10px;padding:10px;font-weight:700;cursor:pointer;">取消</button>
      <button class="btn primary" id="editorSave" type="button" style="flex:1;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:700;cursor:pointer;">保存</button>
    </div>
  </aside>

  <!-- 预定清单条目附件弹窗（完成人 / 说明 / 图片凭证）-->
  <div class="modal-mask" id="attachModal">
    <div class="modal">
      <h3 id="mTitle">附件</h3>
      <div class="m-meta" id="mMeta"></div>
      <label>完成人</label>
      <input type="text" id="mWho" placeholder="填写完成人姓名">
      <label>文字说明（可选）</label>
      <textarea id="mNote" placeholder="例如：已在携程下单，订单号 12345…"></textarea>
      <label>图片证明（可选）</label>
      <div class="file-drop" id="mDrop">📷 点击上传图片（订单截图 / 凭证）</div>
      <input type="file" id="mFile" accept="image/*" hidden>
      <div class="preview-img" id="mPreview"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="mCancel" type="button" style="background:#eef3f1;color:#3a5850;">取消</button>
        <button class="btn primary" id="mSave" type="button" style="background:var(--primary);color:#fff;">保存</button>
      </div>
    </div>
  </div>

  <!-- 图片放大 -->
  <div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt=""></div>

  <!-- 照片墙上传 / 编辑弹窗 -->
  <div class="modal-mask" id="photoModal">
    <div class="modal photo-modal">
      <h3 id="photoModalTitle">添加照片</h3>
      <div class="m-meta" id="photoScopeText"></div>
      <label>照片</label>
      <div class="file-drop" id="photoDrop">选择照片</div>
      <input type="file" id="photoFile" accept="image/*" hidden>
      <div class="preview-img" id="photoPreview"></div>
      <label>说明</label>
      <input type="text" id="photoCaption" placeholder="例如：蓝月谷水面很漂亮">
      <label>目的地</label>
      <select id="photoDestination"></select>
      <label>关联对象</label>
      <select id="photoScope"></select>
      <div class="modal-actions">
        <button class="btn ghost" id="photoCancel" type="button" style="background:#eef3f1;color:#3a5850;">取消</button>
        <button class="btn primary" id="photoSave" type="button" style="background:var(--primary);color:#fff;">保存</button>
      </div>
    </div>
  </div>

  <!-- 小白熊聊天助手 -->
  <button class="chat-fab" id="chatFab" type="button" title="AI 行程助手" aria-label="AI 行程助手"><span class="chat-pet" aria-hidden="true"></span></button>
  <div class="chat-mask" id="chatMask"></div>
  <aside class="chat-panel" id="chatPanel" aria-hidden="true">
    <div class="chat-head">
      <div class="chat-title">
        <b>小白熊行程助手</b>
        <span class="chat-sub">增删改查行程 / 清单 / 物品 / 花销</span>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="关闭">×</button>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-inputbar">
      <textarea id="chatText" rows="1" placeholder="例如：把泸沽湖那笔花销改成 600 / 加一项防晒霜到出行物品 / 删掉返程机票预定项"></textarea>
      <button class="chat-send" id="chatSend" type="button">发送</button>
    </div>
  </aside>

  <script type="module" src="js/trip.js"></script>
</body>
</html>
